<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ERA — First Breath · the district, watched</title>
<style>
  :root { --panel:#14161d; --ink:#e8e4da; --dim:#9a94886; --line:#2a2d38; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#0c0d12; color:#e8e4da;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #app { display:flex; height:100vh; }
  #stage { flex:1; position:relative; min-width:0; }
  canvas { display:block; width:100%; height:100%; }
  #side { width:340px; background:#14161d; border-left:1px solid #2a2d38;
    display:flex; flex-direction:column; }
  #side h1 { font-size:15px; margin:0; padding:16px 18px 4px; letter-spacing:.02em; }
  #side .sub { padding:0 18px 12px; color:#8f8a7e; font-size:12px; }
  #clock { padding:10px 18px; border-top:1px solid #2a2d38; border-bottom:1px solid #2a2d38; }
  #clock .big { font-size:24px; font-weight:600; letter-spacing:.01em; }
  #clock .oak { color:#c9a227; font-size:12px; margin-top:2px; }
  #events { flex:1; overflow-y:auto; padding:10px 16px; }
  #events .e { padding:3px 0; border-bottom:1px solid #1d2029; font-size:12.5px; }
  #events .who { color:#b7b0a2; }
  #events .match { color:#f2cc8f; }
  #events .dog { color:#c79a6b; font-style:italic; }
  #legend { padding:10px 16px; border-top:1px solid #2a2d38; max-height:150px; overflow-y:auto; }
  #legend .row { display:inline-flex; align-items:center; gap:6px; margin:2px 8px 2px 0; font-size:12px; }
  #legend .sw { width:10px; height:10px; border-radius:50%; display:inline-block; }
  #controls { display:flex; align-items:center; gap:10px; padding:10px 16px; border-top:1px solid #2a2d38; }
  #controls button { background:#22252f; color:#e8e4da; border:1px solid #333a48;
    border-radius:6px; padding:6px 12px; cursor:pointer; font-size:13px; }
  #controls button:hover { background:#2b2f3b; }
  #scrub { position:absolute; left:16px; right:16px; bottom:14px; }
  #scrub input { width:100%; }
  .hint { position:absolute; left:18px; top:14px; color:#cfc8b8; font-size:12px;
    background:rgba(12,13,18,.5); padding:4px 8px; border-radius:6px; }
  select { background:#22252f; color:#e8e4da; border:1px solid #333a48; border-radius:6px; padding:5px; }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="hint">Press <b>space</b> to play/pause · drag the timeline to scrub</div>
    <div id="scrub"><input id="range" type="range" min="0" value="0" step="0.01"></div>
  </div>
  <div id="side">
    <h1>ERA — First Breath</h1>
    <div class="sub">the district, watched. deterministic — the same seed, the same week.</div>
    <div id="clock"><div class="big" id="ctime">—</div><div class="oak" id="coak"></div></div>
    <div id="events"></div>
    <div id="legend"></div>
    <div id="controls">
      <button id="play">▶ Play</button>
      <label>speed
        <select id="speed">
          <option value="1">1×</option>
          <option value="2" selected>2×</option>
          <option value="4">4×</option>
          <option value="8">8×</option>
        </select>
      </label>
    </div>
  </div>
</div>
<script>
const TRACE = __TRACE__;
(function(){
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  const coord = {}; TRACE.locations.forEach(l => coord[l.id] = {x:l.x, y:l.y, ...l});
  const ent = TRACE.entities;
  const ticks = TRACE.ticks;
  const N = ticks.length;
  const range = document.getElementById('range');
  range.max = (N-1).toFixed(2);

  // ---- layout / DPI ----
  let W=0,H=0,scale=1,ox=0,oy=0;
  function resize(){
    const r = cv.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio||1;
    cv.width = r.width*dpr; cv.height=r.height*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    W=r.width; H=r.height;
    // fit map 1000x760 into view with padding
    const mw=1000, mh=760, pad=30;
    scale = Math.min((W-pad*2)/mw, (H-pad*2)/mh);
    ox = (W - mw*scale)/2; oy = (H - mh*scale)/2;
  }
  function sx(x){ return ox + x*scale; }
  function sy(y){ return oy + y*scale; }
  window.addEventListener('resize', resize);

  // ---- colour helpers ----
  function lerp(a,b,t){ return a+(b-a)*t; }
  function hex(h){ h=h.replace('#',''); return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)]; }
  function mix(c1,c2,t){ const a=hex(c1),b=hex(c2); return `rgb(${Math.round(lerp(a[0],b[0],t))},${Math.round(lerp(a[1],b[1],t))},${Math.round(lerp(a[2],b[2],t))})`; }
  // sky keyframes by hour
  const SKY = [[0,'#0f1220'],[5,'#182036'],[7,'#f0c79c'],[10,'#c9dbe6'],[14,'#d9e6ea'],[17,'#f4b168'],[20,'#a35f49'],[22,'#1b1728'],[24,'#0f1220']];
  const GROUND = [[0,'#171b18'],[6,'#20261f'],[9,'#39412f'],[14,'#3e472f'],[18,'#4a3e2a'],[21,'#241f1c'],[24,'#171b18']];
  function keyColor(kf, hour){
    for(let i=0;i<kf.length-1;i++){ if(hour>=kf[i][0]&&hour<=kf[i+1][0]){ const t=(hour-kf[i][0])/(kf[i+1][0]-kf[i][0]); return mix(kf[i][1],kf[i+1][1],t);} }
    return kf[0][1];
  }
  function nightness(hour){ // 0 day .. 1 deep night
    if(hour>=21||hour<5) return 1;
    if(hour>=5&&hour<7) return 1-(hour-5)/2;
    if(hour>=19&&hour<21) return (hour-19)/2;
    return 0;
  }

  // ---- entity screen position at continuous tick ct ----
  function framePos(frame, id){
    const p = frame.p[id];
    if(!p) return null;
    if(p.at){ const c=coord[p.at]; return c?[c.x,c.y]:null; }
    if(p.e){ const a=coord[p.e[0]], b=coord[p.e[1]]; if(!a||!b) return null; return [lerp(a.x,b.x,p.t), lerp(a.y,b.y,p.t)]; }
    return null;
  }
  function entPos(ct, id){
    const i=Math.max(0,Math.min(N-1,Math.floor(ct))), j=Math.min(N-1,i+1), f=ct-i;
    const a=framePos(ticks[i],id), b=framePos(ticks[j],id);
    if(!a) return b; if(!b) return a;
    return [lerp(a[0],b[0],f), lerp(a[1],b[1],f)];
  }

  // small stable offset so co-located entities don't perfectly overlap
  const offs = {}; ent.forEach((e,i)=>{ const ang=i*2.399; offs[e.id]=[Math.cos(ang)*13,Math.sin(ang)*13]; });

  function draw(ct){
    const fi = Math.max(0,Math.min(N-1,Math.floor(ct)));
    const fr = ticks[fi];
    const hour = fr.h + (ct-fi); // smooth hour
    // sky
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, keyColor(SKY,hour%24));
    g.addColorStop(1, keyColor(GROUND,hour%24));
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // two moons at night — seen, never said
    const nl = nightness(fr.h);
    if(nl>0.05){
      ctx.save(); ctx.globalAlpha = nl*0.9;
      const day=fr.d;
      // larger, slower moon
      const m1x = W*(0.18 + 0.12*Math.sin(day*0.6)), m1y=H*0.16;
      ctx.fillStyle='#eae2c8'; ctx.beginPath(); ctx.arc(m1x,m1y,17,0,7); ctx.fill();
      // smaller, quicker moon
      const m2x = W*(0.72 + 0.10*Math.cos(day*1.7)), m2y=H*0.11;
      ctx.fillStyle='#cdd6e0'; ctx.beginPath(); ctx.arc(m2x,m2y,10,0,7); ctx.fill();
      ctx.restore();
    }

    // roads
    ctx.lineWidth = Math.max(6, 9*scale); ctx.strokeStyle='rgba(20,18,14,.35)'; ctx.lineCap='round';
    TRACE.edges.forEach(([a,b])=>{ const A=coord[a],B=coord[b]; ctx.beginPath(); ctx.moveTo(sx(A.x),sy(A.y)); ctx.lineTo(sx(B.x),sy(B.y)); ctx.stroke(); });

    // locations
    TRACE.locations.forEach(l=>{
      const x=sx(l.x), y=sy(l.y);
      const open = l.hours ? (fr.h>=l.hours[0] && fr.h<l.hours[1]) : true;
      const isStadium = l.id==='loc_stadium', isOak=l.id==='loc_riverside';
      const r = (isStadium?26:20)*scale;
      // glow if lit (shops open, or residence at night, or stadium on matchday)
      const matchday = fr.wd==='Sat';
      const lit = (l.hours && open) || (l.home && nl>0.3) || (isStadium && matchday && fr.h>=13 && fr.h<=18);
      ctx.beginPath(); ctx.arc(x,y,r,0,7);
      ctx.fillStyle = l.home ? 'rgba(120,110,150,.30)' : (isOak?'rgba(120,140,90,.30)':'rgba(210,200,170,.16)');
      ctx.fill();
      if(lit){ ctx.save(); ctx.shadowColor='rgba(255,210,120,.9)'; ctx.shadowBlur=22*scale; ctx.fillStyle='rgba(255,214,140,.5)'; ctx.beginPath(); ctx.arc(x,y,r*0.55,0,7); ctx.fill(); ctx.restore(); }
      ctx.lineWidth=1.5; ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.stroke();
      // the Oak glyph
      if(isOak){ ctx.fillStyle='#7c9a54'; ctx.beginPath(); ctx.arc(x, y-2, 11*scale,0,7); ctx.fill(); ctx.fillStyle='#5b4a34'; ctx.fillRect(x-2*scale, y, 4*scale, 12*scale);
        // scarves / flowers accumulate
        if(fr.sc>0){ ctx.fillStyle='#d1495b'; for(let i=0;i<Math.min(fr.sc,6);i++){ ctx.fillRect(x-14*scale+i*5*scale, y+13*scale, 3*scale, 7*scale);} }
        if(fr.bq>0){ ctx.fillStyle='#e6b3d1'; for(let i=0;i<Math.min(fr.bq,6);i++){ ctx.beginPath(); ctx.arc(x-12*scale+i*5*scale, y+24*scale, 2.2*scale,0,7); ctx.fill(); } }
      }
      // label
      ctx.fillStyle = open? 'rgba(240,235,222,.92)':'rgba(240,235,222,.4)';
      ctx.font = `${Math.round(12*Math.max(.8,scale))}px sans-serif`; ctx.textAlign='center';
      ctx.fillText(l.name, x, y+r+14*scale);
    });

    // entities
    ent.forEach(e=>{
      const pos = entPos(ct, e.id); if(!pos) return;
      const o = offs[e.id]||[0,0];
      const x=sx(pos[0])+o[0]*scale, y=sy(pos[1])+o[1]*scale;
      const dog = e.kind==='dog';
      const r = (dog?7:8)*Math.max(.85,scale);
      ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle=e.color; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle= dog?'rgba(255,255,255,.5)':'rgba(0,0,0,.35)'; ctx.stroke();
      if(!dog){ ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(9*Math.max(.85,scale))}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(e.name[0], x, y+0.5); ctx.textBaseline='alphabetic'; }
    });
  }

  // ---- events panel ----
  let lastFrame=-1;
  function updateSide(ct){
    const fi=Math.max(0,Math.min(N-1,Math.floor(ct))); const fr=ticks[fi];
    document.getElementById('ctime').textContent = `Day ${fr.d} · ${fr.wd} · ${String(fr.h).padStart(2,'0')}:00`;
    document.getElementById('coak').textContent = `The Old Oak — ${fr.sc} scarf${fr.sc===1?'':'s'}, ${fr.bq} bouquet${fr.bq===1?'':'s'}`;
    if(fi===lastFrame) return; lastFrame=fi;
    const box=document.getElementById('events');
    // show events from the last few frames
    let html='';
    for(let k=Math.max(0,fi-3);k<=fi;k++){
      ticks[k].ev.forEach(([who,msg])=>{
        let cls='e';
        if(who==='Matchday') cls='e match';
        else if(who==='the old dog') cls='e dog';
        const w = who==='Matchday'?'':`<span class="who">${who}</span> `;
        html += `<div class="${cls}">${w}${msg}</div>`;
      });
    }
    box.innerHTML = html || '<div class="e" style="color:#6a675e">…a quiet hour…</div>';
    box.scrollTop = box.scrollHeight;
  }

  // ---- legend ----
  (function(){ const L=document.getElementById('legend'); L.innerHTML = ent.map(e=>`<span class="row"><span class="sw" style="background:${e.color}"></span>${e.name}</span>`).join(''); })();

  // ---- playback ----
  let ct=0, playing=false, speed=2, last=0;
  const playBtn=document.getElementById('play');
  function setPlaying(p){ playing=p; playBtn.textContent = p?'⏸ Pause':'▶ Play'; }
  playBtn.onclick=()=>setPlaying(!playing);
  document.getElementById('speed').onchange=e=>speed=+e.target.value;
  range.addEventListener('input', ()=>{ ct=+range.value; setPlaying(false); draw(ct); updateSide(ct); });
  window.addEventListener('keydown', e=>{ if(e.code==='Space'){ e.preventDefault(); setPlaying(!playing);} });

  function frame(ts){
    if(!last) last=ts; const dt=(ts-last)/1000; last=ts;
    if(playing){ ct += dt*speed; if(ct>=N-1){ ct=N-1; setPlaying(false);} range.value=ct.toFixed(2); }
    draw(ct); updateSide(ct);
    requestAnimationFrame(frame);
  }
  resize(); draw(0); updateSide(0); setPlaying(true);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
