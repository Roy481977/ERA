<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ERA — the living district</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --ink:#e6edf3; --dim:#8b98a5;
    --line:#2a3441; --accent:#e6b800; --warm:#e07a5f;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:grid; grid-template-columns:1fr 340px; grid-template-rows:auto 1fr auto;
    grid-template-areas:"head head" "stage side" "bar bar"; height:100vh; }
  header { grid-area:head; display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
    padding:12px 18px; border-bottom:1px solid var(--line); background:var(--panel); }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.02em; }
  header .clock { font-variant-numeric:tabular-nums; font-size:15px; color:var(--ink); }
  header .clock b { color:var(--accent); }
  header .phase { color:var(--dim); font-style:italic; }
  header .season { color:#81b29a; margin-left:auto; }
  #stagewrap { grid-area:stage; position:relative; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; }
  #callouts { position:absolute; left:14px; top:12px; right:14px; display:flex; flex-direction:column;
    gap:6px; pointer-events:none; }
  .callout { align-self:flex-start; background:rgba(20,26,34,.86); border:1px solid var(--line);
    border-left:3px solid var(--accent); padding:5px 11px; border-radius:5px; font-size:13px;
    max-width:80%; backdrop-filter:blur(3px); }
  .callout.match { border-left-color:var(--warm); }
  .callout.oak { border-left-color:#81b29a; }
  .callout.social { border-left-color:#c05299; }
  aside { grid-area:side; background:var(--panel); border-left:1px solid var(--line);
    overflow-y:auto; padding:14px; }
  aside h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim);
    margin:18px 0 8px; font-weight:600; }
  aside h2:first-child { margin-top:0; }
  .sel { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:11px; }
  .sel .name { font-weight:600; font-size:15px; }
  .sel .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:7px;
    vertical-align:middle; }
  .sel .meta { color:var(--dim); margin-top:3px; }
  .sel .doing { margin-top:7px; }
  .hint { color:var(--dim); font-size:12px; }
  .bond { display:flex; justify-content:space-between; gap:8px; padding:3px 0; border-bottom:1px solid var(--line); }
  .bond .who { color:var(--ink); } .bond .where { color:var(--dim); font-size:12px; }
  .bond .n { color:var(--accent); font-variant-numeric:tabular-nums; }
  #ticker { list-style:none; margin:0; padding:0; max-height:260px; overflow-y:auto; }
  #ticker li { padding:4px 0 4px 10px; border-left:2px solid var(--line); margin-bottom:3px; font-size:13px; }
  #ticker li.b { border-left-color:var(--ink); }
  #ticker li.match { border-left-color:var(--warm); }
  #ticker li.town { border-left-color:#3d84a8; color:var(--dim); }
  #ticker li.micro { border-left-color:#6a4c93; color:var(--dim); }
  #ticker li.moment { border-left-color:#8d99ae; color:var(--dim); font-style:italic; }
  #ticker li.dog,#ticker li.oak { border-left-color:#8b5a2b; }
  #ticker .who { color:var(--accent); }
  footer { grid-area:bar; display:flex; align-items:center; gap:14px; padding:10px 18px;
    border-top:1px solid var(--line); background:var(--panel); }
  button { background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:6px;
    padding:6px 14px; cursor:pointer; font-size:13px; }
  button:hover { border-color:var(--dim); }
  button.play { background:var(--accent); color:#1a1200; border-color:var(--accent); font-weight:600; min-width:74px; }
  input[type=range] { flex:1; accent-color:var(--accent); }
  .speed { display:flex; align-items:center; gap:6px; color:var(--dim); }
  .live { display:inline-flex; align-items:center; gap:6px; color:var(--warm); font-size:12px; }
  .live .pip { width:8px; height:8px; border-radius:50%; background:var(--warm); animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>ERA · First Breath</h1>
    <div class="clock"><b id="wd">—</b> · day <b id="day">0</b> · <b id="hh">00:00</b>
      <span class="phase" id="phase"></span></div>
    <span class="live"><span class="pip"></span>observing the live engine</span>
    <div class="season" id="season"></div>
  </header>

  <div id="stagewrap">
    <canvas id="c"></canvas>
    <div id="callouts"></div>
  </div>

  <aside>
    <h2>Selected</h2>
    <div class="sel" id="sel"><span class="hint">Click anyone on the map to follow them.</span></div>
    <h2>The Old Oak</h2>
    <div id="oak" class="hint"></div>
    <h2>Bonds forming</h2>
    <div id="bonds"></div>
    <h2>Happening now</h2>
    <ul id="ticker"></ul>
  </aside>

  <footer>
    <button class="play" id="play">Pause</button>
    <button id="restart">Restart</button>
    <input type="range" id="scrub" min="0" value="0" step="1">
    <div class="speed">
      <span>speed</span>
      <button data-mul="0.5">½×</button>
      <button data-mul="1">1×</button>
      <button data-mul="2">2×</button>
      <button data-mul="4">4×</button>
    </div>
  </footer>
</div>

  playing = !playing; e.target.textContent = playing ? 'Pause' : 'Play';
};
document.getElementById('restart').onclick = () => { frame = 0; };
scrub.oninput = () => { frame = +scrub.value; };
document.querySelectorAll('[data-mul]').forEach(b =>
  b.onclick = () => { speed = +b.dataset.mul; });

c.addEventListener('click', ev => {
  const r = c.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  const fr = FRAMES[Math.round(frame)];
  let best = null, bd = 22;
  fr.entities.forEach(e => {
    const [sx, sy] = S(e.pos.x, e.pos.y);
    const d = Math.hypot(sx - mx, sy - my);
    if (d < bd) { bd = d; best = e.id; }
  });
  selected = best;
});

// linear interpolation of entity positions between the two bracketing frames,
// so travel reads as smooth motion though the engine ticks in whole hours.
function lerpEntities(i0, i1, f) {
  const a = FRAMES[i0], b = FRAMES[i1];
  const bmap = {}; b.entities.forEach(e => bmap[e.id] = e);
  return a.entities.map(e => {
    const e2 = bmap[e.id] || e;
    return { ...e, x: e.pos.x + (e2.pos.x - e.pos.x) * f, y: e.pos.y + (e2.pos.y - e.pos.y) * f };
  });
}

function hoursLabel(h) { return String(h).padStart(2, '0') + ':00'; }

function draw(ents, fr) {
  const w = c.clientWidth, h = c.clientHeight;
  ctx.clearRect(0, 0, w, h);

  // edges
  ctx.strokeStyle = '#222c38'; ctx.lineWidth = 2;
  WORLD.edges.forEach(([a, b]) => {
    const A = NODES[a], B = NODES[b]; if (!A || !B) return;
    const [x1, y1] = S(A.x, A.y), [x2, y2] = S(B.x, B.y);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  });

  const busiest = fr.busiest ? fr.busiest.place : null;
  // nodes
  WORLD.locations.forEach(l => {
    const [x, y] = S(l.x, l.y);
    const open = l.hours ? (fr.hour >= l.hours[0] && fr.hour < l.hours[1]) : true;
    const occ = fr.occupancy[l.id] || 0;
    if (l.id === busiest) {
      ctx.beginPath(); ctx.arc(x, y, 26, 0, 7); ctx.fillStyle = 'rgba(230,184,0,.14)'; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(x, y, l.home ? 8 : 11, 0, 7);
    ctx.fillStyle = l.home ? '#2a3441' : (open ? '#34435a' : '#232c38');
    ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = l.id === busiest ? '#e6b800' : '#3a4759'; ctx.stroke();
    // label
    ctx.fillStyle = '#7d8b99'; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(l.name, x, y + (l.home ? 20 : 24));
    // occupancy badge
    if (occ > 0) {
      ctx.beginPath(); ctx.arc(x + 13, y - 11, 8, 0, 7);
      ctx.fillStyle = l.id === busiest ? '#e6b800' : '#3d84a8'; ctx.fill();
      ctx.fillStyle = l.id === busiest ? '#1a1200' : '#eaf1f6';
      ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(occ, x + 13, y - 11); ctx.textBaseline = 'alphabetic';
    }
  });

  // entities
  ents.forEach(e => {
    const [x, y] = S(e.x, e.y);
    const dog = e.kind === 'dog';
    if (e.id === selected) {
      ctx.beginPath(); ctx.arc(x, y, 13, 0, 7); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(x, y, dog ? 5 : 6.5, 0, 7);
    ctx.fillStyle = e.color; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.stroke();
    if (!dog) {
      ctx.fillStyle = '#c8d3de'; ctx.font = '10px system-ui'; ctx.textAlign = 'center';
      ctx.fillText(e.name, x, y - 11);
    }
  });
}

function renderPanels(fr) {
  document.getElementById('wd').textContent = fr.weekday;
  document.getElementById('day').textContent = fr.day;
  document.getElementById('hh').textContent = hoursLabel(fr.hour);
  document.getElementById('phase').textContent = fr.phase;
  document.getElementById('season').textContent = fr.oak.appearance + ' · ' + fr.oak.season;

  // callouts
  const co = document.getElementById('callouts'); co.innerHTML = '';
  fr.callouts.forEach(k => {
    const d = document.createElement('div'); d.className = 'callout ' + k.kind;
    d.textContent = k.text; co.appendChild(d);
  });

  // selected
  const sel = document.getElementById('sel');
  if (selected) {
    const e = fr.entities.find(x => x.id === selected);
    if (e) sel.innerHTML =
      `<div class="name"><span class="dot" style="background:${e.color}"></span>${e.name}</div>`
      + `<div class="meta">${e.placeName}${e.moving ? ' · on the move' : ''}</div>`
      + `<div class="doing">${e.doing}</div>`;
  } else {
    sel.innerHTML = '<span class="hint">Click anyone on the map to follow them.</span>';
  }

  // oak
  document.getElementById('oak').innerHTML =
    `${fr.oak.ageYears} years old, ${fr.oak.appearance} this ${fr.oak.season}.<br>`
    + `${fr.oak.visits} visits · ${fr.oak.scarves} scarves · ${fr.oak.bouquets} bouquets`;

  // bonds
  const bd = document.getElementById('bonds');
  bd.innerHTML = fr.bonds.length ? '' : '<span class="hint">no shared history yet</span>';
  fr.bonds.forEach(b => {
    const row = document.createElement('div'); row.className = 'bond';
    row.innerHTML = `<span class="who">${b.a} &amp; ${b.b}</span>`
      + `<span class="where">${b.place ? 'the ' + b.place : ''}</span>`
      + `<span class="n">${b.meetings}×</span>`;
    bd.appendChild(row);
  });

  // ticker
  const t = document.getElementById('ticker'); t.innerHTML = '';
  fr.events.forEach(([who, text, kind]) => {
    const li = document.createElement('li'); li.className = kind;
    li.innerHTML = kind === 'b' ? `<span class="who">${who}</span> ${(text.startsWith(who) ? text.slice(who.length).trim() : text)}`
                                 : `<span class="who">${who}</span> — ${text}`;
    t.appendChild(li);
  });
}

let prevT = -1;
function tick(ts) {
  if (last === null) last = ts;
  const dt = (ts - last) / 1000; last = ts;
  if (playing) {
    frame += dt * BASE_HPS * speed;
    if (frame >= FRAMES.length - 1) { frame = FRAMES.length - 1; playing = false;
      document.getElementById('play').textContent = 'Play'; }
  }
  const i0 = Math.floor(frame), i1 = Math.min(i0 + 1, FRAMES.length - 1), f = frame - i0;
  const fr = FRAMES[i0];
  const ents = lerpEntities(i0, i1, f);
  draw(ents, fr);
  if (i0 !== prevT) { renderPanels(fr); prevT = i0; scrub.value = i0; }
  requestAnimationFrame(tick);
}

resize();
renderPanels(FRAMES[0]);
requestAnimationFrame(tick);
</script>
</body>
</html>
