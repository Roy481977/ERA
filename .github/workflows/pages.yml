name: Deploy ERA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add the WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack and trunk
        run: |
          cargo install --locked wasm-pack
          cargo install --locked trunk

      - name: Build the top-down client (engine to wasm)
        run: wasm-pack build development/sprint-1 --release --target web --out-dir ../../web/pkg --features wasm

      - name: Build the district (Bevy to wasm)
        working-directory: development/district
        env:
          RUSTFLAGS: '--cfg getrandom_backend="wasm_js"'
        run: trunk build --release --public-url /ERA/district/

      - name: Assemble the site
        run: |
          rm -rf _site
          mkdir -p _site/district
          cp web/*.html web/*.js _site/
          cp -r web/pkg _site/pkg
          cp -r development/district/dist/. _site/district/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
