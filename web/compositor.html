<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ERA — the living plate</title>
<style>
  :root { --line:#2a2a30; --ink:#f4efe6; --dim:#a7a19a; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #16161a; color: var(--ink);
    font: 14px/1.4 -apple-system, system-ui, sans-serif; }
  #app { display: grid; grid-template-rows: auto 1fr auto; height: 100%; }
  header { padding: 10px 16px; display: flex; align-items: baseline; gap: 14px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 14px; font-weight: 700; letter-spacing: .04em; margin: 0; text-transform: uppercase; color: #e8c15a; }
  #clock { font-size: 14px; }
  #clock .dim, .dim { color: var(--dim); font-weight: 400; }
  #sub { margin-left: auto; color: var(--dim); font-size: 12px; }
  #stage { position: relative; overflow: hidden; }
  #c { position: absolute; inset: 0; }
  #c { cursor: pointer; }
  #near { position: absolute; left: 14px; bottom: 12px; display: flex; flex-direction: column; gap: 4px; max-width: 42%; max-height: 40%; overflow: hidden; }
  #near .cal { background: rgba(0,0,0,.5); backdrop-filter: blur(3px); padding: 4px 9px; border-radius: 7px; font-size: 12px; color: #f0e8d8; }
  #near .cal .t { color: #e8c15a; font-variant-numeric: tabular-nums; margin-right: 4px; }
  /* inspector */
  #inspector { position: absolute; top: 14px; right: 14px; width: 232px; background: rgba(20,20,26,.82); backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; font-size: 12.5px; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
  #inspector.hidden { display: none; }
  #inspector .ihead { display: flex; align-items: center; gap: 7px; font-size: 15px; margin-bottom: 6px; }
  #inspector .ihead .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  #inspector .ihead button { margin-left: auto; padding: 1px 7px; font-size: 13px; background: transparent; border: none; color: var(--dim); }
  #inspector .irow { color: var(--dim); font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 6px; }
  #inspector .idoing { font-style: italic; color: #f0e8d8; margin-bottom: 6px; line-height: 1.35; }
  #inspector .imeta { color: #cfc8bd; margin-bottom: 8px; }
  #inspector .imeta b, #inspector .idoing b { color: #fff; font-style: normal; font-weight: 600; }
  #inspector .istat { display: flex; align-items: center; gap: 6px; color: var(--dim); margin: 3px 0; }
  #inspector .istat span { color: #e8dcc6; min-width: 54px; }
  #inspector .bar { flex: 1; height: 6px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; }
  #inspector .bar i { display: block; height: 100%; }
  #inspector .iworn { color: var(--dim); font-size: 11.5px; margin-top: 6px; }
  #inspector .ibonds { margin-top: 9px; border-top: 1px solid var(--line); padding-top: 7px; }
  #inspector .ibonds .lbl { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
  #inspector .bond { display: flex; justify-content: space-between; padding: 2px 4px; border-radius: 5px; cursor: pointer; }
  #inspector .bond:hover { background: rgba(255,255,255,.07); }
  #inspector .bond .aff { color: #e0736a; font-size: 10px; letter-spacing: 1px; }
  footer { padding: 9px 16px; display: flex; align-items: center; gap: 14px; border-top: 1px solid var(--line); flex-wrap: wrap; }
  button { background: #23232a; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
  button:hover { background: #2c2c34; }
  input[type=range] { accent-color: #e8c15a; }
  #scrub { flex: 1; min-width: 160px; }
  label { display: inline-flex; align-items: center; gap: 5px; color: var(--dim); font-size: 12px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>ERA</h1>
    <div>
      <div id="clock">loading…</div>
    </div>
    <div id="sub"></div>
  </header>
  <div id="stage">
    <canvas id="c"></canvas>
    <div id="near"></div>
    <div id="inspector" class="hidden"></div>
  </div>
  <footer>
    <button id="play">❚❚</button>
    <input id="scrub" type="range" min="0" max="287" value="0" />
    <label>pace <input id="speed" type="range" style="width:110px" /> <span id="speedv" style="min-width:120px;display:inline-block">live · real time</span></label>
    <label><input id="pins" type="checkbox" /> pins</label>
    <label><input id="names" type="checkbox" /> names</label>
  </footer>
</div>
<script src="compositor.js"></script>
</body>
</html>
