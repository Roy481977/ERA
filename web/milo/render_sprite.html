<!doctype html><html><head><meta charset="utf8"><style>html,body{margin:0;background:transparent}#c{display:block}</style>
<script type="importmap">{"imports":{"three":"/vendor/three_build/three.module.js","three/addons/":"/vendor/three_jsm/"}}</script>
</head><body>
<canvas id="c" width="384" height="512"></canvas>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const W=384,H=512;
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setSize(W,H,false);
renderer.setClearColor(0x000000,0);
renderer.outputColorSpace=THREE.SRGBColorSpace;

const scene=new THREE.Scene();
// soft warm key from upper-right + cool sky fill — matches the plate's baked sun (matte clay)
const hemi=new THREE.HemisphereLight(0xf3ead6,0x5a6472,1.15); scene.add(hemi);
const key=new THREE.DirectionalLight(0xfff3dd,1.35); key.position.set(3,5,2.5); scene.add(key);
const fill=new THREE.DirectionalLight(0x9fb0c8,0.35); fill.position.set(-3,2,-1); scene.add(fill);

// three-quarter-from-slightly-above orthographic camera (clean sprite scale, no perspective skew)
const cam=new THREE.OrthographicCamera(-1,1,1,-1,0.01,100);
const AZ=30*Math.PI/180, EL=22*Math.PI/180;  // camera azimuth/elevation
function placeCamera(center,height){
  const halfH=height*0.62, halfW=halfH*(W/H);
  cam.left=-halfW; cam.right=halfW; cam.top=halfH; cam.bottom=-halfH;
  const dist=height*4;
  const d=new THREE.Vector3(Math.sin(AZ)*Math.cos(EL),Math.sin(EL),Math.cos(AZ)*Math.cos(EL));
  cam.position.copy(center).addScaledVector(d,dist);
  cam.up.set(0,1,0); cam.lookAt(center); cam.updateProjectionMatrix();
}

let mixer=null, model=null, clips={}, clipDur=0;
const loader=new GLTFLoader();
loader.load('/milo/milo_anim.glb',(g)=>{
  model=g.scene; scene.add(model);
  // matte clay: kill any gloss the exporter added
  model.traverse(o=>{ if(o.isMesh&&o.material){ o.material.roughness=1.0; o.material.metalness=0.0; if(o.material.map) o.material.map.colorSpace=THREE.SRGBColorSpace; }});
  for(const c of g.animations) clips[c.name]=c;
  mixer=new THREE.AnimationMixer(model);
  const bb=new THREE.Box3().setFromObject(model);
  const center=bb.getCenter(new THREE.Vector3());
  const size=bb.getSize(new THREE.Vector3());
  window.__height=size.y; window.__footY=bb.min.y; window.__center=[center.x,center.y,center.z];
  placeCamera(new THREE.Vector3(center.x,center.y,center.z), size.y);
  window.__ready=true;
});

// play a named clip and freeze the mixer so we can scrub deterministically
window.__setClip=(name)=>{ mixer.stopAllAction(); const clip=clips[name]||Object.values(clips)[0];
  const a=mixer.clipAction(clip); a.play(); clipDur=clip.duration; window.__dur=clipDur; return clipDur; };
window.__face=(deg)=>{ if(model){ model.rotation.y=deg*Math.PI/180; } };
window.__seek=(u)=>{ // u in 0..1 over one loop
  mixer.setTime(0); mixer.update(u*clipDur); renderer.render(scene,cam); };
window.__names=()=>Object.keys(clips);
</script>
</body></html>
